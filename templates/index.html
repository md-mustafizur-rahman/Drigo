<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drigo AI Assistant</title>
    <meta name="description" content="Drigo - Your AI Voice Assistant powered by Gemini">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <header>
            <div class="logo">Drigo <span>AI</span></div>
            <p class="subtitle">Your intelligent voice assistant</p>
        </header>

        <!-- Voice Chat Section -->
        <div class="card glass voice-card">
            <div id="chatHistory" class="chat-history"></div>

            <div class="voice-controls">
                <div id="statusLabel" class="status-label">Click to speak</div>
                <button id="micBtn" class="mic-button" title="Press to talk">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                    <div id="ripple" class="ripple" style="display:none;"></div>
                </button>
                <div class="volume-meter">
                    <div id="volumeBar" class="volume-bar"></div>
                </div>
            </div>
        </div>

        <!-- Add User Section (collapsible) -->
        <details class="card glass" style="margin-top:1rem;">
            <summary style="cursor:pointer; padding: 0.25rem 0; font-weight:600; list-style:none;">
                ⚙️ Add User to System
            </summary>
            <form id="addUserForm" style="margin-top:1rem;">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                <button type="submit" id="submitBtn">
                    <span class="btn-text">Add User</span>
                    <span class="btn-loader" style="display: none;">Adding...</span>
                </button>
            </form>
            <div id="statusMessage" class="status-message"></div>
        </details>
    </div>

    <audio id="ttsAudio" style="display: none;"></audio>

    <script>
        // ── State machine ──────────────────────────────────────────────────────
        const STATE = { IDLE: 'idle', RECORDING: 'recording', PROCESSING: 'processing', SPEAKING: 'speaking' };
        let currentState = STATE.IDLE;
        let mediaRecorder = null;
        let audioChunks   = [];
        let micStream     = null;
        let audioCtxRef   = null;
        let animFrame     = null;

        const micBtn      = document.getElementById('micBtn');
        const statusLabel = document.getElementById('statusLabel');
        const chatHistory = document.getElementById('chatHistory');
        const ttsAudio    = document.getElementById('ttsAudio');
        const volumeBar   = document.getElementById('volumeBar');
        const ripple      = document.getElementById('ripple');

        function setState(s) {
            currentState = s;
            micBtn.className = 'mic-button';
            ripple.style.display = 'none';
            volumeBar.style.width = '0%';
            stopAnalyser();
            switch (s) {
                case STATE.IDLE:
                    statusLabel.textContent = 'Click to speak';
                    break;
                case STATE.RECORDING:
                    statusLabel.textContent = '🔴 Recording — click to stop';
                    micBtn.classList.add('recording');
                    ripple.style.display = 'block';
                    break;
                case STATE.PROCESSING:
                    statusLabel.textContent = '⏳ Processing your request...';
                    micBtn.classList.add('processing');
                    break;
                case STATE.SPEAKING:
                    statusLabel.textContent = '🔊 Drigo is speaking — click to stop';
                    micBtn.classList.add('speaking');
                    break;
            }
        }

        // ── Mic button click ───────────────────────────────────────────────────
        micBtn.addEventListener('click', async () => {
            if      (currentState === STATE.IDLE)      await startRecording();
            else if (currentState === STATE.RECORDING)  stopRecording();
            else if (currentState === STATE.SPEAKING)  { ttsAudio.pause(); setState(STATE.IDLE); }
        });

        // ── Recording functions ────────────────────────────────────────────────
        async function startRecording() {
            try {
                micStream   = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(micStream);

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    micStream.getTracks().forEach(t => t.stop());
                    setState(STATE.PROCESSING);
                    const rawBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    try {
                        const wavBlob = await convertToWav(rawBlob);
                        await sendVoiceCommand(wavBlob);
                    } catch (err) {
                        console.warn('WAV conversion failed, sending raw:', err);
                        await sendVoiceCommand(rawBlob);
                    }
                };

                mediaRecorder.start(100);
                setState(STATE.RECORDING);
                startAnalyser(micStream);
            } catch (err) {
                console.error('Microphone error:', err);
                addChatMessage('error', '⚠️ Microphone access denied. Please allow it in your browser.');
                setState(STATE.IDLE);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }

        // ── Volume visualiser ─────────────────────────────────────────────────
        function startAnalyser(stream) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const src      = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            src.connect(analyser);
            audioCtxRef = { audioCtx, analyser };

            const data = new Uint8Array(analyser.frequencyBinCount);
            (function tick() {
                analyser.getByteFrequencyData(data);
                const avg = data.reduce((a, b) => a + b, 0) / data.length;
                volumeBar.style.width = Math.min(100, avg * 3) + '%';
                animFrame = requestAnimationFrame(tick);
            })();
        }

        function stopAnalyser() {
            if (animFrame) cancelAnimationFrame(animFrame);
            if (audioCtxRef) { audioCtxRef.audioCtx.close().catch(() => {}); audioCtxRef = null; }
        }

        // ── Send audio to server ──────────────────────────────────────────────
        async function sendVoiceCommand(blob) {
            const userEl = addChatMessage('user', '🎤 Processing...');
            const fd     = new FormData();
            fd.append('audio', blob, 'recording.wav');

            try {
                const resp = await fetch('/api/voice-command', { method: 'POST', body: fd });
                const data = await resp.json();

                if (resp.ok) {
                    const tx = (data.transcript || '').trim();
                    userEl.innerHTML = `<strong>You:</strong> ${tx || '(silence — please speak louder)'}`;

                    if (data.ai_response) addChatMessage('ai', data.ai_response);

                    if (data.audio) {
                        playBase64Audio(data.audio);
                    } else {
                        setState(STATE.IDLE);
                    }
                } else {
                    userEl.className = 'chat-message error';
                    userEl.textContent = '⚠️ ' + (data.error || 'Server error occurred');
                    setState(STATE.IDLE);
                }
            } catch (err) {
                userEl.className = 'chat-message error';
                userEl.textContent = '⚠️ Network error. Is the server running?';
                console.error(err);
                setState(STATE.IDLE);
            }
        }

        // ── Audio playback ────────────────────────────────────────────────────
        function playBase64Audio(b64) {
            const bytes = atob(b64);
            const buf   = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) buf[i] = bytes.charCodeAt(i);
            ttsAudio.src    = URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
            ttsAudio.onended = () => setState(STATE.IDLE);
            setState(STATE.SPEAKING);
            ttsAudio.play();
        }

        // ── Chat helpers ──────────────────────────────────────────────────────
        function addChatMessage(role, text) {
            const div = document.createElement('div');
            div.className = `chat-message ${role}`;
            div.innerHTML  = (role === 'ai') ? `<strong>Drigo:</strong> ${text}` : text;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
            return div;
        }

        // ── WAV encoder (browser-side, 16kHz mono PCM) ───────────────────────
        async function convertToWav(blob) {
            const ab  = await blob.arrayBuffer();
            const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const buf = await ctx.decodeAudioData(ab);
            const pcm = buf.getChannelData(0);

            const out  = new ArrayBuffer(44 + pcm.length * 2);
            const view = new DataView(out);
            const str  = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };

            str(0,  'RIFF');  view.setUint32(4,  36 + pcm.length * 2, true);
            str(8,  'WAVE');  str(12, 'fmt ');
            view.setUint32(16, 16, true);    // chunk size
            view.setUint16(20, 1, true);     // PCM
            view.setUint16(22, 1, true);     // mono
            view.setUint32(24, 16000, true); // sample rate
            view.setUint32(28, 32000, true); // byte rate
            view.setUint16(32, 2, true);     // block align
            view.setUint16(34, 16, true);    // bits/sample
            str(36, 'data');  view.setUint32(40, pcm.length * 2, true);

            for (let i = 0, o = 44; i < pcm.length; i++, o += 2) {
                const s = Math.max(-1, Math.min(1, pcm[i]));
                view.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return new Blob([out], { type: 'audio/wav' });
        }

        // ── Add User form ─────────────────────────────────────────────────────
        const form      = document.getElementById('addUserForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText   = submitBtn.querySelector('.btn-text');
        const btnLoader = submitBtn.querySelector('.btn-loader');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            btnText.style.display  = 'none';
            btnLoader.style.display = 'inline-block';
            statusMsg.textContent   = '';
            statusMsg.className     = 'status-message';

            const payload = { name: document.getElementById('name').value, email: document.getElementById('email').value };

            try {
                const resp = await fetch('/api/add-user', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if (resp.ok) {
                    const ct = resp.headers.get('content-type') || '';
                    if (ct.includes('audio')) {
                        ttsAudio.src = URL.createObjectURL(await resp.blob());
                        ttsAudio.play();
                        statusMsg.textContent = '✅ User added! Playing voice confirmation...';
                        statusMsg.classList.add('success');
                    } else {
                        const d = await resp.json();
                        statusMsg.textContent = d.warning || '✅ User added successfully!';
                        statusMsg.classList.add(d.warning ? 'warning' : 'success');
                    }
                    form.reset();
                } else {
                    const err = await resp.json();
                    statusMsg.textContent = `❌ Error: ${err.error || 'Failed to add user'}`;
                    statusMsg.classList.add('error');
                }
            } catch {
                statusMsg.textContent = '❌ Network error: Could not reach the server.';
                statusMsg.classList.add('error');
            } finally {
                submitBtn.disabled = false;
                btnText.style.display   = 'inline-block';
                btnLoader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
